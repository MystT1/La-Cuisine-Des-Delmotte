<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Carnet Rose Gold</title>
    <style>
        /* --- STYLE CSS ROSE GOLD --- */
        :root {
            --rose-gold: #b76e79;
            --light-rose: #fdf7f8;
            --gold-gradient: linear-gradient(135deg, #b76e79 0%, #e9b7ce 50%, #c18b95 100%);
            --dark-grey: #5a5a5a;
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--light-rose);
            color: var(--dark-grey);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        header {
            background: var(--gold-gradient);
            color: white;
            padding: 40px 20px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(183, 110, 121, 0.3);
            margin-bottom: 30px;
        }

        header h1 {
            margin: 0;
            font-size: 2.5rem;
            letter-spacing: 2px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        header span {
            font-weight: 300;
            font-style: italic;
        }

        main {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Formulaire */
        #recipe-form {
            background: var(--white);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 1px solid rgba(183, 110, 121, 0.2);
        }

        h2 {
            color: var(--rose-gold);
            margin-top: 0;
            font-weight: 400;
            text-align: center;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        input, textarea {
            padding: 15px;
            border: 1px solid #eee;
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
            background-color: #fffafb;
        }

        input:focus, textarea:focus {
            border-color: var(--rose-gold);
            box-shadow: 0 0 8px rgba(183, 110, 121, 0.2);
            background-color: white;
        }

        textarea {
            height: 120px;
            resize: vertical;
        }

        button.btn-add {
            background: var(--gold-gradient);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button.btn-add:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(183, 110, 121, 0.4);
        }

        /* Liste des recettes */
        #recipes-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            margin-top: 40px;
        }

        .recipe-card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.03);
            border-top: 4px solid var(--rose-gold);
            position: relative;
            animation: fadeIn 0.6s ease;
        }

        .recipe-card h3 {
            margin: 0 0 10px 0;
            color: var(--rose-gold);
            font-size: 1.4rem;
        }

        .recipe-card p {
            font-size: 0.95rem;
            color: #666;
            white-space: pre-line; /* Garde les sauts de ligne */
        }

        .btn-delete {
            background: transparent;
            color: #cc8e97;
            border: 1px solid #eccdd1;
            padding: 5px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.8rem;
            margin-top: 15px;
            transition: all 0.2s;
        }

        .btn-delete:hover {
            background: #fff0f2;
            color: #b76e79;
            border-color: var(--rose-gold);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        hr {
            border: none;
            height: 1px;
            background-color: rgba(183, 110, 121, 0.2);
            margin: 50px 0;
        }
    </style>
</head>
<body>

    <header>
        <h1>Mes Délices <span>Rose Gold</span></h1>
    </header>

    <main>
        <section id="recipe-form">
            <h2>Ajouter une nouvelle recette</h2>
            <div class="form-group">
                <input type="text" id="recipe-title" placeholder="Ex: Macarons à la framboise...">
                <textarea id="recipe-desc" placeholder="Ingrédients, temps de cuisson, étapes..."></textarea>
                <button class="btn-add" onclick="addRecipe()">Enregistrer dans mon carnet</button>
            </div>
        </section>

        <hr>

        <section id="recipes-container">
            <h2>Mon Carnet Secret</h2>
            <div id="recipes-list">
                </div>
        </section>
    </main>

    <script>
        // Charger les recettes enregistrées dès l'ouverture
        document.addEventListener('DOMContentLoaded', displayRecipes);

        function addRecipe() {
            const titleInput = document.getElementById('recipe-title');
            const descInput = document.getElementById('recipe-desc');

            if (titleInput.value.trim() === '' || descInput.value.trim() === '') {
                alert("Oups ! N'oublie pas de donner un nom et une description à ta recette.");
                return;
            }

            const newRecipe = {
                id: Date.now(),
                title: titleInput.value,
                desc: descInput.value
            };

            // Sauvegarde dans le localStorage
            const recipes = JSON.parse(localStorage.getItem('roseGoldRecipes')) || [];
            recipes.push(newRecipe);
            localStorage.setItem('roseGoldRecipes', JSON.stringify(recipes));

            // Nettoyage et rafraîchissement
            titleInput.value = '';
            descInput.value = '';
            displayRecipes();
        }

        function displayRecipes() {
            const list = document.getElementById('recipes-list');
            const recipes = JSON.parse(localStorage.getItem('roseGoldRecipes')) || [];
            
            list.innerHTML = '';

            if (recipes.length === 0) {
                list.innerHTML = '<p style="text-align:center; grid-column: 1/-1; color: #aaa;">Aucune recette pour le moment. À vos fourneaux !</p>';
                return;
            }

            // On affiche les plus récentes en haut
            recipes.reverse().forEach(recipe => {
                const card = document.createElement('div');
                card.className = 'recipe-card';
                card.innerHTML = `
                    <h3>${recipe.title}</h3>
                    <p>${recipe.desc}</p>
                    <button class="btn-delete" onclick="deleteRecipe(${recipe.id})">Supprimer la recette</button>
                `;
                list.appendChild(card);
            });
        }

        function deleteRecipe(id) {
            let recipes = JSON.parse(localStorage.getItem('roseGoldRecipes'));
            recipes = recipes.filter(r => r.id !== id);
            localStorage.setItem('roseGoldRecipes', JSON.stringify(recipes));
            displayRecipes();
        }
    </script>
</body>
</html>
